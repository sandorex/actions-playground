name: builder

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'

jobs:
  build:
    name: Build and package fonts
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3


      - name: Build and package the fonts
        run: ./build.sh --package --all

      - name: Release Dev Build
        uses: softprops/action-gh-release@v1
        with:
          name: Dev Build
          tag_name: DEV
          fail_on_unmatched_files: true
          prerelease: true
          body: "Latest dev build"
          files: | # NOTE: files have to be overriden otherwise they will stay outdated so no version in name
            CompacityFonts.zip

      - name: Release Tagged Build
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          fail_on_unmatched_files: true
          files: |
            *.zip

