name: builder

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'

jobs:
  build:
    name: Build and package fonts
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download the font and generate the info
        run: |
          mkdir -p fonts

          # test with DEV as the old versions are named differently
          wget "https://github.com/sandorex/compacity-fonts/releases/download/DEV/CompacityFonts.zip"
          mv *.zip fonts/
          pushd fonts
          unzip *.zip
          rm *zip
          popd

          # install the deps
          npm install

          # run json generator script
          npm run gen

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: build
